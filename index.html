<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#2563eb">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <title>Cabin Checklist</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; background: #f5f5f5; transition: background 0.3s, color 0.3s; }
    body.dark { background: #1f2937; color: #f9fafb; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    h1 { color: #1f2937; }
    body.dark h1 { color: #f9fafb; }
    .toggle { padding: 8px 16px; background: #2563eb; color: white; border: none; border-radius: 6px; cursor: pointer; }
    .toggle:hover { background: #1d4ed8; }
    .season-toggle { display: flex; gap: 10px; margin-bottom: 20px; }
    .season-btn { flex: 1; padding: 12px; background: white; color: #1f2937; border: 2px solid #d1d5db; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: 500; }
    .season-btn.active { background: #2563eb; color: white; border-color: #2563eb; }
    body.dark .season-btn { background: #374151; color: #f9fafb; border-color: #4b5563; }
    body.dark .season-btn.active { background: #2563eb; border-color: #2563eb; }
    .item { display: flex; align-items: center; gap: 10px; padding: 12px; background: white; border-radius: 6px; margin-bottom: 8px; }
    body.dark .item { background: #374151; }
    .item.done label { text-decoration: line-through; opacity: 0.6; }
    .item input[type="checkbox"] { width: 20px; height: 20px; cursor: pointer; }
    .item label { flex: 1; cursor: pointer; color: #1f2937; }
    body.dark .item label { color: #f9fafb; }
    #qr-code { display: flex; justify-content: center; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Cabin Checklist</h1>
    <button class="toggle" onclick="toggleTheme()">🌙</button>
  </div>
  
  <div id="sync-controls" style="margin-bottom: 20px; display: flex; gap: 10px;">
    <button class="toggle" onclick="hostSession()" style="flex: 1;">Host Session</button>
    <button class="toggle" onclick="joinSession()" style="flex: 1;">Join Session</button>
  </div>
  <div id="sync-status" style="text-align: center; font-size: 12px; color: #6b7280; margin-bottom: 20px;"></div>
  
  <div id="qr-container" style="display: none; margin-bottom: 20px; text-align: center; background: white; padding: 20px; border-radius: 6px;">
    <div id="qr-code"></div>
    <p style="margin-top: 10px; font-size: 14px; color: #6b7280;">Scan this code with the other phone</p>
  </div>
  
  <div id="camera-container" style="display: none; margin-bottom: 20px;">
    <video id="camera" style="width: 100%; border-radius: 6px;" autoplay playsinline></video>
    <button class="toggle" onclick="stopCamera()" style="width: 100%; margin-top: 10px;">Cancel</button>
  </div>
  
  <div class="season-toggle">
    <button class="season-btn active" onclick="setSeason('summer')">Summer</button>
    <button class="season-btn" onclick="setSeason('winter')">Winter</button>
  </div>
  <div id="list"></div>

  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }

    let peer = null;
    let conn = null;
    let cameraStream = null;
    let hasInitialMerge = false;

    const lists = {
      summer: [
        { text: 'Turn hot water heater to pilot', done: false },
        { text: 'Turn off 2 well switches', done: false },
        { text: 'Clean bathroom toilet, sink, tub', done: false },
        { text: 'Empty bathroom trash - put new bag in', done: false },
        { text: 'Strip bed (sheets and pillow cases only) and put in utility sink', done: false },
        { text: 'Wash and dry (if here long enough the day you leave)', done: false },
        { text: 'Towels in utility sink (or washed and dried if here long enough)', done: false },
        { text: 'Place quilt and blankets back in plastic zipper bags and hang on hook in room', done: false },
        { text: 'Empty any fridge food', done: false },
        { text: 'Wipe out fridge', done: false },
        { text: 'Wash dishes and put away', done: false },
        { text: 'Empty coffee grounds', done: false },
        { text: 'Clean counters, stove, fridge and microwave', done: false },
        { text: 'Vacuum floors (mop if stained)', done: false },
        { text: 'Close blinds', done: false },
        { text: 'Make sure all windows are closed and locked', done: false },
        { text: 'Pick up dog poop in dog area (bucket and scooper are attached to fence)', done: false },
        { text: 'Slide dog door cover down', done: false },
        { text: 'Take kitchen trash with you', done: false },
        { text: 'Lock front door correctly', done: false },
        { text: 'Make sure propane grill tank is turned off and grill is covered', done: false },
        { text: 'Lock front gate', done: false }
      ],
      winter: [
        { text: 'Turn off 2 well switches', done: false },
        { text: 'Replenish deck wood pile & kindling', done: false },
        { text: 'Turn on kitchen sink handles and leave on (even after water stops flowing!)', done: false },
        { text: 'Turn on and leave on downstairs sink', done: false },
        { text: 'Turn on and leave on downstairs bathtub', done: false },
        { text: 'Flush downstairs toilet', done: false },
        { text: 'Open downstairs cabinet door', done: false },
        { text: 'Turn on and leave on upstairs sink', done: false },
        { text: 'Turn on and leave on upstairs bathtub', done: false },
        { text: 'Flush upstairs toilet', done: false },
        { text: 'Open upstairs cabinet door', done: false },
        { text: 'Leave left bedroom, upstairs bedroom and bathroom doors open (so pipes get heat)', done: false },
        { text: 'Turn thermostat for heat to 48 (push set, while blinking push down arrow to 48, push set again)', done: false },
        { text: 'Make sure rag is in the outside dryer vent', done: false },
        { text: 'Turn hot water heater to pilot', done: false },
        { text: 'Clean bathroom toilet, sink, tub', done: false },
        { text: 'Empty bathroom trash - put new bag in', done: false },
        { text: 'Strip bed (sheets and pillow cases only) and put in utility sink', done: false },
        { text: 'Wash and dry (if here long enough the day you leave)', done: false },
        { text: 'Towels in utility sink (or washed and dried if here long enough)', done: false },
        { text: 'Place quilt and blankets back in plastic zipper bags and hang on hook in room', done: false },
        { text: 'Empty any fridge food', done: false },
        { text: 'Wipe out fridge', done: false },
        { text: 'Wash dishes and put away', done: false },
        { text: 'Empty coffee grounds', done: false },
        { text: 'Clean counters, stove, fridge and microwave', done: false },
        { text: 'Vacuum floors (mop if stained)', done: false },
        { text: 'Close blinds', done: false },
        { text: 'Make sure all windows are closed and locked', done: false },
        { text: 'Pick up dog poop in dog area (bucket and scooper are attached to fence)', done: false },
        { text: 'Slide dog door cover down', done: false },
        { text: 'Take kitchen trash with you', done: false },
        { text: 'Lock front door correctly', done: false },
        { text: 'Make sure propane grill tank is turned off and grill is covered', done: false },
        { text: 'Lock front gate', done: false }
      ]
    };

    let season = localStorage.getItem('season') || 'summer';
    let items = lists[season];

    const dark = localStorage.getItem('dark') === 'true';
    if (dark) document.body.classList.add('dark');

    const saved = JSON.parse(localStorage.getItem('checks') || '{}');
    const now = Date.now();
    
    if (saved.timestamp && now - saved.timestamp < 86400000 && saved.season === season) {
      saved.states.forEach((done, i) => items[i].done = done);
    }

    function render() {
      document.querySelectorAll('.season-btn').forEach(btn => {
        btn.classList.toggle('active', btn.textContent.toLowerCase() === season);
      });
      
      document.getElementById('list').innerHTML = items.map((item, i) => `
        <div class="item ${item.done ? 'done' : ''}">
          <input type="checkbox" ${item.done ? 'checked' : ''} onchange="toggle(${i})">
          <label onclick="toggle(${i})">${item.text}</label>
        </div>
      `).join('');
    }

    function toggle(i) {
      items[i].done = !items[i].done;
      const state = {
        timestamp: Date.now(),
        season: season,
        states: items.map(item => item.done)
      };
      localStorage.setItem('checks', JSON.stringify(state));
      
      if (conn && conn.open) {
        conn.send(state);
      }
      
      render();
    }

    function setSeason(newSeason) {
      season = newSeason;
      items = lists[season];
      localStorage.setItem('season', season);
      
      const saved = JSON.parse(localStorage.getItem('checks') || '{}');
      const now = Date.now();
      if (saved.timestamp && now - saved.timestamp < 86400000 && saved.season === season) {
        saved.states.forEach((done, i) => items[i].done = done);
      }
      
      render();
      
      // Request current state from peer when switching seasons
      if (conn && conn.open) {
        conn.send({ type: 'request_state', season: season });
      }
    }

    function toggleTheme() {
      document.body.classList.toggle('dark');
      localStorage.setItem('dark', document.body.classList.contains('dark'));
    }

    render();

    // PeerJS - Single QR scan
    async function hostSession() {
      // Close camera if Join is open
      if (document.getElementById('camera-container').style.display === 'block') {
        stopCamera();
      }
      
      // Toggle off if already showing
      if (document.getElementById('qr-container').style.display === 'block') {
        document.getElementById('qr-container').style.display = 'none';
        updateStatus('');
        if (peer) peer.destroy();
        return;
      }
      
      updateStatus('Creating session...');
      const peerId = 'cabin-' + Math.random().toString(36).substr(2, 6);
      
      peer = new Peer(peerId);
      
      peer.on('open', () => {
        showQRCode(peerId);
        updateStatus('Waiting for peer...');
      });

      peer.on('connection', (connection) => {
        conn = connection;
        setupConnection();
        document.getElementById('qr-container').style.display = 'none';
        updateStatus('✓ Synced');
      });
    }

    async function joinSession() {
      // Close QR if Host is open
      if (document.getElementById('qr-container').style.display === 'block') {
        document.getElementById('qr-container').style.display = 'none';
        if (peer) peer.destroy();
      }
      
      // Toggle off if already showing
      if (document.getElementById('camera-container').style.display === 'block') {
        stopCamera();
        updateStatus('');
        return;
      }
      
      updateStatus('Starting camera...');
      try {
        cameraStream = await navigator.mediaDevices.getUserMedia({ 
          video: { facingMode: 'environment' } 
        });
        const video = document.getElementById('camera');
        video.srcObject = cameraStream;
        document.getElementById('camera-container').style.display = 'block';
        scanQRCode(video);
      } catch (err) {
        updateStatus('Camera access denied');
      }
    }

    function showQRCode(peerId) {
      const container = document.getElementById('qr-code');
      container.innerHTML = '';
      document.getElementById('qr-container').style.display = 'block';
      new QRCode(container, {
        text: peerId,
        width: 256,
        height: 256
      });
    }

    function scanQRCode(video) {
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      
      const scan = () => {
        if (video.readyState === video.HAVE_ENOUGH_DATA) {
          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;
          ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
          const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
          const code = jsQR(imageData.data, imageData.width, imageData.height);
          
          if (code) {
            stopCamera();
            connectToPeer(code.data);
            return;
          }
        }
        requestAnimationFrame(scan);
      };
      scan();
    }

    function connectToPeer(peerId) {
      updateStatus('Connecting...');
      peer = new Peer();
      
      peer.on('open', () => {
        conn = peer.connect(peerId);
        setupConnection();
      });
    }

    function setupConnection() {
      conn.on('open', () => {
        updateStatus('✓ Synced');
        hasInitialMerge = false; // Reset for new connection
        const state = JSON.parse(localStorage.getItem('checks') || '{}');
        if (state.states) {
          conn.send(state);
        }
      });

      conn.on('data', (remoteState) => {
        // Handle state request
        if (remoteState.type === 'request_state') {
          const state = JSON.parse(localStorage.getItem('checks') || '{}');
          if (state.states && state.season === remoteState.season) {
            conn.send(state);
          }
          return;
        }
        
        if (remoteState.season === season) {
          // Only merge on first sync, then use normal sync
          if (!hasInitialMerge) {
            hasInitialMerge = true;
            const localState = JSON.parse(localStorage.getItem('checks') || '{}');
            
            // Merge: if either side has item checked, keep it checked
            const mergedStates = remoteState.states.map((remoteDone, i) => {
              const localDone = localState.states && localState.states[i];
              return remoteDone || localDone || false;
            });
            
            mergedStates.forEach((done, i) => {
              if (items[i]) items[i].done = done;
            });
            
            const merged = {
              timestamp: Date.now(),
              season: season,
              states: mergedStates
            };
            
            localStorage.setItem('checks', JSON.stringify(merged));
            render();
            
            // Send merged state back if different
            if (JSON.stringify(mergedStates) !== JSON.stringify(remoteState.states)) {
              conn.send(merged);
            }
          } else {
            // Normal sync - just apply remote state
            remoteState.states.forEach((done, i) => {
              if (items[i]) items[i].done = done;
            });
            localStorage.setItem('checks', JSON.stringify(remoteState));
            render();
          }
        }
      });

      conn.on('close', () => {
        updateStatus('Disconnected');
        hasInitialMerge = false;
      });
    }

    function stopCamera() {
      if (cameraStream) {
        cameraStream.getTracks().forEach(track => track.stop());
        cameraStream = null;
      }
      document.getElementById('camera-container').style.display = 'none';
    }

    function updateStatus(msg) {
      document.getElementById('sync-status').textContent = msg;
    }
  </script>
</body>
</html>
